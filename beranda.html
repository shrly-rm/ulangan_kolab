<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#6dd5ed,#2193b0);
        }

        .card{
            width:350px;
            background:white;
            padding:35px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .card h1{
            color:#2193b0;
            margin-bottom:15px;
        }

        .card p{
            color:#555;
            margin-bottom:25px;
            line-height:1.5;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:#2193b0;
            color:white;
            padding:12px 25px;
            border-radius:10px;
            transition:0.3s;
            font-weight:bold;
        }

        .btn:hover{
            background:#176d85;
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Website Kolaborasi</h1>

        <p>
            Project ulangan kolaborasi GitHub antara owner dan kolaborator.
        </p>

        <a href="nilai.html" class="btn">
            Masuk ke Halaman Nilai
        </a>
    </div>

</body>
</html>
