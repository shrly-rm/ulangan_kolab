<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Nilai</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        }

        .container{
            width:400px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#ff5e78;
            margin-bottom:25px;
        }

        .box{
            background:#f5f5f5;
            padding:15px;
            border-radius:12px;
            margin-bottom:15px;
        }

        .box h3{
            color:#333;
            margin-bottom:5px;
        }

        .box p{
            color:#666;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            background:#ff5e78;
            color:white;
            padding:12px;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .back:hover{
            background:#e14b64;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Halaman Nilai</h1>

        <div class="box">
            <h3>Owner</h3>
            <p>Nama Owner</p>
        </div>

        <div class="box">
            <h3>Kolaborator 1</h3>
            <p>Nama Kolaborator 1</p>
        </div>

        <div class="box">
            <h3>Kolaborator 2</h3>
            <p>Nama Kolaborator 2</p>
        </div>

        <a href="beranda.html" class="back">
            Kembali ke Beranda
        </a>

    </div>

</body>
</html>
